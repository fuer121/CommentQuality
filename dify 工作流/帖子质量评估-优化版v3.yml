    - data:
        code: "import requests\ndef split_by_200(pics_list, timeout=1):\n    \"\"\"\
          \n    返回: (ok_200, not_200)\n    - ok_200: status_code == 200 的URL\n   \
          \ - not_200: 其它所有情况（非200或请求异常）的URL\n    \"\"\"\n    ok_200, not_200 = [],\
          \ []\n    sess = requests.Session()\n    headers = {\"User-Agent\": \"Mozilla/5.0\
          \ (url-checker)\"}\n    for url in pics_list:\n        try:\n          \
          \  # 用 HEAD 先探测，不下载图片内容；不跟随跳转\n            r = sess.head(url, allow_redirects=False,\
          \ timeout=timeout, headers=headers)\n            # 有些站点不支持 HEAD（405）时用 GET\
          \ 兜底（同样不下载正文）\n            if r.status_code == 405:\n                r =\
          \ sess.get(url, allow_redirects=False, timeout=timeout, headers=headers,\
          \ stream=True)\n            if r.status_code == 200:\n                ok_200.append(url)\n\
          \            else:\n                not_200.append(url)\n        except\
          \ requests.RequestException:\n            not_200.append(url)\n    return\
          \ ok_200, not_200\n\n\ndef main(arg1: str):\n    if '\\n' in arg1:\n   \
          \     pics_list = arg1.split(\"\\n\")\n    elif '\\\\n' in arg1:\n     \
          \   pics_list = arg1.split(\"\\\\n\")\n    else:\n        pics_list = [arg1]\n\
          \    ok_200, not_200 = split_by_200(pics_list)\n    return {\n        \"\
          url_list\": ok_200\n    }\n"
        code_language: python3
        outputs:
          url_list:
            children: null
            type: array[string]
        selected: false
        title: 获取图片url列表
        type: code
        variables:
        - value_selector:
          - '1768187563273'
          - pics
          value_type: string
          variable: arg1
