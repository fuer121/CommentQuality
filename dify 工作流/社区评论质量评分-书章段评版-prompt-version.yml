    - data:
        code: |
          import json
          import re

          def _extract_json(text):
              raw = (text or "").strip()
              if raw.startswith("```"):
                  raw = re.sub(r"^```(?:json|JSON)?\s*", "", raw)
                  raw = re.sub(r"\s*```$", "", raw)
              try:
                  return json.loads(raw)
              except Exception:
                  match = re.search(r"\{[\s\S]*\}", raw)
                  if match:
                      try:
                          return json.loads(match.group(0))
                      except Exception:
                          return {}
              return {}

          def _to_score(value, default=0):
              try:
                  score = int(float(str(value).strip()))
              except Exception:
                  return default
              return max(0, min(100, score))

          def _first_score(data, keys, raw, default=0):
              for key in keys:
                  if key in data:
                      return _to_score(data.get(key), default)
              for key in keys:
                  pattern = rf'"?{re.escape(key)}"?\s*[:：]\s*"?(\d+)'
                  match = re.search(pattern, raw or "")
                  if match:
                      return _to_score(match.group(1), default)
              return default

          def main(raw_text: str):
              data = _extract_json(raw_text)
              quality_score = _first_score(data, ["quality_score", "result", "score"], raw_text, 0)
              emotion_score = _first_score(data, ["emotion_score"], raw_text, 50)
              quality_reason = str(data.get("quality_reason") or data.get("reason") or "").strip()
              if not quality_reason:
                  quality_reason = "模型输出解析失败或理由为空，已按兜底规则处理。"

              return {
                  "quality_score": quality_score,
                  "quality_reason": quality_reason,
                  "emotion_score": emotion_score,
              }
